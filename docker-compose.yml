services:
  # 1. Database Container
  postgres:
    image: postgres:15-alpine
    container_name: aggregator_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - aggregator_network

  # 2. NestJS Backend Container
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aggregator_backend
    ports:
      - "${API_PORT}:4000"
    environment:
      - PORT=${API_PORT}
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
    networks:
      - aggregator_network

  # 3. NextJS Frontend Container
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aggregator_frontend
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - aggregator_network

volumes:
  pgdata:

networks:
  aggregator_network:
    driver: bridge
